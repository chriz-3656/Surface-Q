<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #09090b;
      color: #f4f4f5;
    }
    :focus-visible {
      outline: 2px solid #00e5ff;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.1rem;
      margin: 0;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    #toggle-mode-btn {
      background: #18181b;
      color: #a1a1aa;
      border: 1px solid #27272a;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    #toggle-mode-btn:hover {
      background: #27272a;
      color: #ffffff;
    }
    button#scan-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #ffffff;
      color: #09090b;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background-color 0.15s;
    }
    button#scan-btn:hover {
      background-color: #e4e4e7;
    }
    .status {
      font-size: 0.8rem;
      color: #71717a;
      margin-bottom: 12px;
    }
    .result {
      background: #0f0f11;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.75rem;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
      display: none;
    }
    .simple-card {
      background: #0f0f11;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .links-footer {
      margin-top: 16px;
      border-top: 1px solid #27272a;
      padding-top: 12px;
      display: flex;
      justify-content: space-around;
      font-size: 0.75rem;
    }
    .links-footer a {
      color: #a1a1aa;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }
    .links-footer a:hover {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>SurfaceQ Check 🛡️</h1>
    <button id="toggle-mode-btn">Simple Mode</button>
  </div>
  
  <div class="status" id="status">Ready to scan current website.</div>
  <button id="scan-btn">Scan Website</button>
  
  <!-- Adaptive Results views -->
  <div class="simple-card" id="simple-box"></div>
  <div class="result" id="result-box"></div>
  
  <div class="links-footer">
    <a href="#" id="view-dashboard-link">Launch Dashboard</a>
    <a href="#" id="view-repo-link">Official Website</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
