version: '3.8'

services:
  server:
    build: ./server
    container_name: surfaceq-server
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - surfaceq-data:/app/data
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - surfaceq-network

networks:
  surfaceq-network:
    driver: bridge

volumes:
  surfaceq-data:
    driver: local
