name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static files
        run: |
          mkdir -p _site
          if [ -d extension/dashboard ]; then
            cp -r extension/dashboard/* _site/
          fi
          if [ -d extension/styles ]; then
            cp -r extension/styles _site/styles
          fi
          echo "Static files prepared for deployment"
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: always()
    steps:
      - name: Report deployment status
        run: |
          if [ "${{ needs.deploy-pages.result }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
            exit 1
          fi
