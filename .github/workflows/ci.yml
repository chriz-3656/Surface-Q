name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: cd server && npm ci
      - name: Run linter
        run: cd server && npm run lint --if-present

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: cd server && npm ci
      - name: Run tests
        run: cd server && npm test --if-present
      - name: Build
        run: cd server && npm run build --if-present

  extension-check:
    name: Extension Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json
        run: |
          if [ -f extension/manifest.json ]; then
            echo "Validating manifest.json..."
            python3 -c "import json; json.load(open('extension/manifest.json'))"
            echo "manifest.json is valid JSON"
          else
            echo "No manifest.json found - skipping"
          fi
      - name: Check extension structure
        run: |
          echo "Checking extension directory structure..."
          if [ -d extension/ ]; then
            find extension/ -type f -name '*.js' -o -name '*.html' -o -name '*.css' | head -20
            echo "Extension files found"
          else
            echo "No extension directory - skipping"
          fi
